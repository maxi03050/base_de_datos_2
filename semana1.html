<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Semana 1 - Planificación</title>
  <link rel="stylesheet" href="body.css" />
</head>
<body>
   <!-- NOMBRE FIJO ARRIBA A LA DERECHA -->
   <div class="user-name">Samuel Max Vega Brañez</div>
   <div class="semana-container">
    <div class="semana-header">
      <!-- BOTÓN PARA VOLVER -->
      <a href="tareas.html" class="back-button">← Volver a Tareas</a>
      <h1>📝 Semana 1 - Planificación</h1>
      <p>Sube y gestiona tu trabajo de esta semana</p>
    </div>

    <!-- SUBIR ARCHIVO -->
    <div class="upload-section">
      <h2>Subir Trabajo</h2>
      <form class="upload-form" id="uploadForm">
        <div class="file-input-wrapper">
          <div class="file-input-button">📁 Seleccionar Archivo</div>
          <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.ppt,.pptx" />
        </div>
        <button type="button" onclick="subirArchivo()">📤 Subir Trabajo</button>
      </form>
    </div>

    <!-- PREVISUALIZACIÓN -->
    <div class="work-preview" id="workPreview" style="display: none;">
      <h2>Trabajo Subido</h2>
      <img id="previewImage" class="preview-image" alt="Vista previa del trabajo" />
      <div class="file-info">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <a id="downloadLink" href="#" target="_blank" style="display:none; margin-top:10px; display:block;">⬇️ Descargar Archivo</a>
      <button onclick="eliminarArchivo()" style="margin-top: 15px;">🗑️ Eliminar Archivo</button>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-storage.js";

    // ✅ Configuración corregida de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBxHee84DXCu9iFKHEl1312zMETDb9esfU",
      authDomain: "base-de-datos-2-77b48.firebaseapp.com",
      projectId: "base-de-datos-2-77b48",
      storageBucket: "base-de-datos-2-77b48.appspot.com",  // 👈 corregido
      messagingSenderId: "570886056199",
      appId: "1:570886056199:web:2d6cceac652f83cc9a7da2"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    // Variables globales
    let uploadedFileRef = null;

    // SUBIR ARCHIVO
    async function subirArchivo() {
      const fileInput = document.getElementById('fileInput');
      const workPreview = document.getElementById('workPreview');
      const previewImage = document.getElementById('previewImage');
      const fileName = document.getElementById('fileName');
      const fileSize = document.getElementById('fileSize');
      const downloadLink = document.getElementById('downloadLink');

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const filePath = `trabajos/${file.name}`; 
        uploadedFileRef = ref(storage, filePath);

        try {
          // Subir archivo
          await uploadBytes(uploadedFileRef, file);
          const url = await getDownloadURL(uploadedFileRef);

          // Mostrar info
          fileName.textContent = file.name;
          fileSize.textContent = `Tamaño: ${(file.size / 1024).toFixed(2)} KB`;

          // Preview si es imagen, sino ícono
          if (file.type.startsWith('image/')) {
            previewImage.src = url;
          } else {
            previewImage.src = 'https://cdn-icons-png.flaticon.com/512/109/109612.png';
          }
          previewImage.style.display = 'block';
          workPreview.style.display = 'block';

          // Link de descarga
          downloadLink.href = url;
          downloadLink.style.display = 'block';

          alert('✅ Archivo subido a Firebase');
        } catch (error) {
          console.error(error);
          alert('❌ Error al subir el archivo');
        }
      } else {
        alert('⚠️ Por favor selecciona un archivo');
      }
    }

    // ELIMINAR ARCHIVO
    async function eliminarArchivo() {
      const fileInput = document.getElementById('fileInput');
      const workPreview = document.getElementById('workPreview');
      const downloadLink = document.getElementById('downloadLink');

      if (uploadedFileRef) {
        try {
          await deleteObject(uploadedFileRef);
          alert('🗑️ Archivo eliminado de Firebase');
        } catch (error) {
          console.error(error);
          alert('❌ Error al eliminar el archivo');
        }
      }

      // Reset UI
      fileInput.value = '';
      workPreview.style.display = 'none';
      downloadLink.style.display = 'none';
    }

    // Exponer funciones
    window.subirArchivo = subirArchivo;
    window.eliminarArchivo = eliminarArchivo;
  </script>
</body>
</html>
